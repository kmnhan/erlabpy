name: Compatibility

on:
  workflow_dispatch:
  schedule:
    # Every friday at 22:00 UTC (Every saturday at 07:00 KST/JST)
    - cron: "0 22 * * FRI"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  compat:
    name: Compat Python ${{ matrix.python-version }} [${{ matrix.qt-api }}] ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DISPLAY: ":99.0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        qt-api: ["pyqt6", "pyside6"]
        group:
          - "compat-rest"
          - "compat-manager-mainwindow"
          - "compat-manager-workspace"
          - "compat-manager-provenance-console"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pyvista/setup-headless-display-action@v4
        with:
          pyvista: false
          qt: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install project with upgraded dependencies
        run: uv sync --all-extras --dev --group ${{ matrix.qt-api }} --upgrade

      - name: Resolve compatibility targets
        run: uv run python -m scripts.ci_test_groups ${{ matrix.group }} > "$RUNNER_TEMP/targets.txt"

      - name: Run compatibility suite
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t targets < "$RUNNER_TEMP/targets.txt"
          PYTEST_QT_API=${{ matrix.qt-api }} QT_API=${{ matrix.qt-api }} \
            uv run pytest \
            -v \
            -o faulthandler_timeout=300 \
            --junitxml "junit-${{ matrix.python-version }}-${{ matrix.qt-api }}-${{ matrix.group }}.xml" \
            -o junit_family=legacy \
            "${targets[@]}"

      - name: Upload compatibility JUnit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compat-${{ matrix.python-version }}-${{ matrix.qt-api }}-${{ matrix.group }}
          path: junit-${{ matrix.python-version }}-${{ matrix.qt-api }}-${{ matrix.group }}.xml
          if-no-files-found: error
